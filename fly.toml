app = 'boutique-kanban-lm'
primary_region = 'gru'

[env]
  RAILWAY_VOLUME_MOUNT_PATH = "/data"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1

[[mounts]]
  source = 'boutique_data'
  destination = '/data'
